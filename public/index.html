<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#161616" />
    <meta name="description" content="Premier League Player Dashboard — browse 414 players, compare stats, visualise formations." />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Player Dashboard</title>
    <style>
      /* Shown instantly before React loads — keeps the page from looking blank */
      body { margin: 0; background: #161616; font-family: -apple-system, "Segoe UI", sans-serif; }
      #pre-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #f4f4f4;
        gap: 1rem;
      }
      #pre-loader h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
      #pre-loader p  { font-size: 0.875rem; color: #a8a8a8; margin: 0; }
      .spinner {
        width: 36px; height: 36px;
        border: 3px solid #393939;
        border-top-color: #0f62fe;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Visible immediately while JS bundle downloads and React boots -->
    <div id="pre-loader">
      <div class="spinner"></div>
      <h1>Player Dashboard</h1>
      <p>Loading…</p>
    </div>

    <div id="root"></div>

    <!-- Hide the pre-loader as soon as React takes over the #root div -->
    <script>
      var observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          var loader = document.getElementById('pre-loader');
          if (loader) loader.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
